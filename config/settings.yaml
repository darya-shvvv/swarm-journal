trip_detection:
  home_city: Minsk         # default/fallback
  min_checkins: 5          # minimum check-ins outside home to count as a real trip
  
  # Time-based home city periods (inclusive start, exclusive end)
  home_periods:
    - start: ~              # beginning of time
      end: 1763136000       # 2025-11-14 00:00:00 UTC (14.11.2025)
      city: Hrodna
    - start: 1763136000     # 2025-11-14 00:00:00 UTC
      end: ~                # future
      city: Minsk

dashboard:
  title: "Check-in Journal"
  subtitle_source: "Foursquare"
  foursquare_user_id: "29447180"

output:
  index_html: index.html
  trips_html: trips.html


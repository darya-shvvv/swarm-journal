# .github/workflows/upsert-d1.yml
#
# Manual workflow to upsert selected D1 tables WITHOUT deleting existing rows.
# Rows present in JSON but missing from D1 are inserted; existing rows are updated.
# Rows present in D1 but removed from JSON are LEFT ALONE.
#
# Use when:
#   • A single rating / tip / list entry was added manually to the JSON
#   • You want to push incremental changes without a full wipe
#
# For a full wipe + reinsert use "Force resync D1 tables" instead.
#
# Required repository secrets (same as update-dashboard.yml):
#   DATA_REPO_PAT      — Fine-grained PAT with Contents read on darya-shvvv/foursquare-data
#   CF_D1_TOKEN        — Cloudflare API token with D1:Edit permission
#   CF_ACCOUNT_ID      — Cloudflare account ID
#   CF_D1_DATABASE_ID  — D1 database ID

name: Upsert D1 tables (no deletion)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      upsert_ratings:
        description: "Ratings — INSERT OR REPLACE from venueRatings.json (no DELETE)"
        type: boolean
        default: false
      upsert_tips:
        description: "Tips — INSERT OR REPLACE from tips.json (no DELETE)"
        type: boolean
        default: false
      upsert_trips:
        description: "Trips — INSERT OR REPLACE from trips_meta.json (no DELETE)"
        type: boolean
        default: false
      upsert_lists:
        description: "Lists + list_venues — INSERT OR REPLACE from lists.json (no DELETE)"
        type: boolean
        default: false

jobs:
  upsert:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: darya-shvvv/foursquare-data
          token: ${{ secrets.DATA_REPO_PAT }}
          path: private-data

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Upsert selected D1 tables
        env:
          CF_D1_TOKEN:       ${{ secrets.CF_D1_TOKEN }}
          CF_ACCOUNT_ID:     ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
        run: |
          if [ -z "$CF_D1_TOKEN" ]; then
            echo "CF_D1_TOKEN not set — cannot run."
            exit 1
          fi

          RATINGS_ARG=""
          if [ -f private-data/venueRatings.json ]; then
            RATINGS_ARG="--ratings private-data/venueRatings.json"
          fi
          LISTS_ARG=""
          if [ -f private-data/lists.json ]; then
            LISTS_ARG="--lists private-data/lists.json"
          fi

          CHANGED_FLAGS=""
          if [ "${{ inputs.upsert_ratings }}" = "true" ]; then CHANGED_FLAGS="$CHANGED_FLAGS --ratings-changed true"; fi
          if [ "${{ inputs.upsert_tips }}"    = "true" ]; then CHANGED_FLAGS="$CHANGED_FLAGS --tips-changed true";    fi
          if [ "${{ inputs.upsert_trips }}"   = "true" ]; then CHANGED_FLAGS="$CHANGED_FLAGS --trips-changed true";   fi
          if [ "${{ inputs.upsert_lists }}"   = "true" ]; then CHANGED_FLAGS="$CHANGED_FLAGS --lists-changed true";   fi

          if [ -z "$CHANGED_FLAGS" ]; then
            echo "No tables selected — nothing to do."
            exit 0
          fi

          python scripts/sync_to_d1.py \
            --csv   private-data/checkins.csv \
            --tips  private-data/tips.json \
            --trips trips_meta.json \
            $RATINGS_ARG $LISTS_ARG \
            $CHANGED_FLAGS

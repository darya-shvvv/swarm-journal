# .github/workflows/fetch-lists.yml
#
# Manual workflow: incrementally fetch all Foursquare user lists,
# update lists.json in the private data repo, and rebuild the dashboard.
#
# Incremental strategy: only re-fetches items for lists whose updatedAt
# timestamp changed since the last fetch. Unchanged lists are skipped.
#
# Run this when you've added/updated lists on Foursquare and want the
# dashboard to reflect the changes. Lists don't change often so this
# is kept separate from the hourly update workflow.
#
# Trigger: Actions tab → "Fetch Foursquare lists" → Run workflow
#
# Required secrets:
#   FOURSQUARE_TOKEN  — Foursquare OAuth token
#   DATA_REPO_PAT     — Fine-grained PAT with Contents read/write on foursquare-data

name: Fetch Foursquare lists

on:
  workflow_dispatch:
    inputs:
      full:
        description: "Force re-fetch all lists (ignores updatedAt, slow)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  fetch-lists:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout public repo (scripts live here) ───────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Checkout private data repo ────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          repository: toouur/foursquare-data
          token: ${{ secrets.DATA_REPO_PAT }}
          path: private-data

      # ── 3. Python setup ──────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Fetch lists ────────────────────────────────────────────────────
      - name: Fetch Foursquare lists
        id: fetch
        env:
          FOURSQUARE_TOKEN: ${{ secrets.FOURSQUARE_TOKEN }}
        run: |
          FULL_ARG=""
          if [ "${{ github.event.inputs.full }}" = "true" ]; then
            FULL_ARG="--full"
          fi
          python scripts/fetch_lists.py \
            --token "$FOURSQUARE_TOKEN" \
            --out private-data/lists.json \
            $FULL_ARG >> "$GITHUB_OUTPUT"

      # ── 5. Commit updated lists.json ──────────────────────────────────────
      - name: Commit to private data repo
        if: steps.fetch.outputs.CHANGED == 'true'
        run: |
          cd private-data
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lists.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: update lists.json [${TIMESTAMP}]"
            git push
          fi
          cd ..

      # ── 6. Rebuild dashboard ─────────────────────────────────────────────
      - name: Rebuild dashboard
        if: steps.fetch.outputs.CHANGED == 'true'
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          PIX_URL_ARG=""
          if [ -n "$R2_PUBLIC_URL" ]; then PIX_URL_ARG="--pix-url ${R2_PUBLIC_URL}"; fi
          PHOTOS_ARG=""
          if [ -f private-data/photos.json ]; then PHOTOS_ARG="--photos private-data/photos.json"; fi
          RATINGS_ARG=""
          if [ -f private-data/venueRatings.json ]; then RATINGS_ARG="--ratings private-data/venueRatings.json"; fi
          python scripts/build.py \
            --input private-data/checkins.csv \
            --config-dir config \
            --output-dir . \
            --lists private-data/lists.json \
            $PHOTOS_ARG $PIX_URL_ARG $RATINGS_ARG

      # ── 7. Commit rebuilt HTML ────────────────────────────────────────────
      - name: Commit updated HTML
        if: steps.fetch.outputs.CHANGED == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lists.html index.html
          [ -f private-data/ratings.json ] && git add ratings.html || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: rebuild lists [${TIMESTAMP}]"
            git push
          fi

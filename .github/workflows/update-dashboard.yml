# .github/workflows/update-dashboard.yml
#
# Two separate jobs depending on trigger:
#
# [push to main]  → verify: checkout → build only (no fetch, no commit, no Cloudflare deploy)
#                   Guards against broken builds being merged.
#
# [hourly schedule / manual dispatch]
#                 → update: fetch check-ins + tips → if neither changed, exit gracefully.
#                   If check-ins OR tips changed: rebuild → commit & push → Cloudflare auto-deploys.
#
# Required repository secrets:
#   FOURSQUARE_TOKEN   — Foursquare OAuth token
#   DATA_REPO_PAT      — Fine-grained PAT with Contents read/write on toouur/foursquare-data
#   NETLIFY_SITE_ID    — found in Netlify site settings → General → Site ID
#   NETLIFY_AUTH_TOKEN — personal access token from app.netlify.com/user/applications

name: Update check-in dashboard

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 */1  * * *"   # every hour
  push:
    branches: [main]         # verify build on every push (no deploy)
  workflow_dispatch:         # manual trigger button in GitHub UI

permissions:
  contents: write

jobs:

  # ── Verify: build-only check on every push to main (no Cloudflare deploy) ──
  verify:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Checkout private data repo ────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          repository: toouur/foursquare-data
          token: ${{ secrets.DATA_REPO_PAT }}
          path: private-data

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build dashboard (verify only — no commit or deploy)
        run: |
          RATINGS_ARG=""
          if [ -f private-data/venueRatings.json ]; then RATINGS_ARG="--ratings private-data/venueRatings.json"; fi
          LISTS_ARG=""
          if [ -f private-data/lists.json ]; then LISTS_ARG="--lists private-data/lists.json"; fi
          python scripts/build.py \
            --input private-data/checkins.csv \
            --config-dir config \
            --output-dir . \
            $RATINGS_ARG $LISTS_ARG

  # ── Update: fetch → skip if no new check-ins → rebuild → commit → deploy ──
  update:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout public repo ───────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Checkout private data repo ────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          repository: toouur/foursquare-data
          token: ${{ secrets.DATA_REPO_PAT }}
          path: private-data

      # ── 3. Python setup ──────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Fetch new check-ins ───────────────────────────────────────────────
      - name: Fetch new Swarm check-ins
        id: fetch
        env:
          FOURSQUARE_TOKEN: ${{ secrets.FOURSQUARE_TOKEN }}
        run: |
          if [ -z "$FOURSQUARE_TOKEN" ]; then
            echo "⚠️  FOURSQUARE_TOKEN secret is not set — skipping fetch."
            echo "CHANGED=false" >> "$GITHUB_OUTPUT"
          else
            python scripts/fetch_checkins.py --token "$FOURSQUARE_TOKEN" --csv private-data/checkins.csv >> "$GITHUB_OUTPUT"
          fi

      # ── 4b. Fetch new tips ───────────────────────────────────────────────────
      - name: Fetch new Foursquare tips
        id: fetch_tips
        env:
          FOURSQUARE_TOKEN: ${{ secrets.FOURSQUARE_TOKEN }}
        run: |
          if [ -z "$FOURSQUARE_TOKEN" ]; then
            echo "⚠️  FOURSQUARE_TOKEN secret is not set — skipping tips fetch."
            echo "CHANGED=false" >> "$GITHUB_OUTPUT"
          else
            python scripts/fetch_tips.py --token "$FOURSQUARE_TOKEN" --out private-data/tips.json --csv private-data/checkins.csv >> "$GITHUB_OUTPUT"
          fi

      # ── 4c. Fetch photos for new check-ins ──────────────────────────────────
      - name: Fetch photos for new check-ins
        id: fetch_photos
        env:
          FOURSQUARE_TOKEN: ${{ secrets.FOURSQUARE_TOKEN }}
        run: |
          if [ -z "$FOURSQUARE_TOKEN" ]; then
            echo "CHANGED=false" >> "$GITHUB_OUTPUT"
          else
            python scripts/fetch_photos.py \
              --token "$FOURSQUARE_TOKEN" \
              --csv   private-data/checkins.csv \
              --out   private-data/photos.json \
              --pix-dir private-data/pix \
              --recheck-days 1 \
              --sleep 0.3 >> "$GITHUB_OUTPUT"
          fi

      # ── 4d. Fetch updated venue ratings ─────────────────────────────────────
      - name: Fetch venue ratings
        id: fetch_ratings
        env:
          FOURSQUARE_TOKEN: ${{ secrets.FOURSQUARE_TOKEN }}
        run: |
          if [ -z "$FOURSQUARE_TOKEN" ]; then
            echo "⚠️  FOURSQUARE_TOKEN secret is not set — skipping ratings fetch."
            echo "CHANGED=false" >> "$GITHUB_OUTPUT"
          else
            python scripts/fetch_ratings.py --token "$FOURSQUARE_TOKEN" --out private-data/venueRatings.json >> "$GITHUB_OUTPUT"
          fi

      # ── 4f. Upload new photos to Cloudflare R2 ──────────────────────────────
      - name: Upload new photos to R2
        if: steps.fetch_photos.outputs.CHANGED == 'true'
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME:        ${{ secrets.R2_BUCKET_NAME }}
        run: |
          pip install awscli --quiet
          aws s3 sync private-data/pix/ s3://${R2_BUCKET_NAME}/pix/ \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --no-progress

      # ── 5. Exit gracefully if nothing changed ────────────────────────────────
      - name: Skip if no new data
        if: |
          github.event_name != 'workflow_dispatch' &&
          steps.fetch.outputs.CHANGED != 'true' &&
          steps.fetch_tips.outputs.CHANGED != 'true' &&
          steps.fetch_photos.outputs.CHANGED != 'true' &&
          steps.fetch_ratings.outputs.CHANGED != 'true'
        run: |
          echo "No new data — nothing to rebuild or deploy."
          exit 0

      # ── 6. Commit updated data files to private data repo ────────────────────
      - name: Commit updated data files to data repo
        if: |
          steps.fetch.outputs.CHANGED == 'true' ||
          steps.fetch_tips.outputs.CHANGED == 'true' ||
          steps.fetch_photos.outputs.CHANGED == 'true' ||
          steps.fetch_ratings.outputs.CHANGED == 'true'
        run: |
          cd private-data
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add checkins.csv tips.json photos.json
          [ -f venueRatings.json ] && git add venueRatings.json || true
          [ -f lists.json ]        && git add lists.json        || true
          if git diff --cached --quiet; then
            echo "Nothing to commit in data repo."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: update data [${TIMESTAMP}]"
            git push
          fi
          cd ..

      # ── 7. Rebuild dashboard ─────────────────────────────────────────────────
      - name: Rebuild dashboard
        if: |
          github.event_name == 'workflow_dispatch' ||
          steps.fetch.outputs.CHANGED == 'true' ||
          steps.fetch_tips.outputs.CHANGED == 'true' ||
          steps.fetch_photos.outputs.CHANGED == 'true' ||
          steps.fetch_ratings.outputs.CHANGED == 'true'
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          PIX_URL_ARG=""
          if [ -n "$R2_PUBLIC_URL" ]; then
            PIX_URL_ARG="--pix-url ${R2_PUBLIC_URL}"
          fi
          PHOTOS_ARG=""
          if [ -f private-data/photos.json ]; then
            PHOTOS_ARG="--photos private-data/photos.json"
          fi
          RATINGS_ARG=""
          if [ -f private-data/venueRatings.json ]; then
            RATINGS_ARG="--ratings private-data/venueRatings.json"
          fi
          LISTS_ARG=""
          if [ -f private-data/lists.json ]; then
            LISTS_ARG="--lists private-data/lists.json"
          fi
          python scripts/build.py \
            --input private-data/checkins.csv \
            --config-dir config \
            --output-dir . \
            $PHOTOS_ARG $PIX_URL_ARG $RATINGS_ARG $LISTS_ARG

      # ── 7b. Sync data to Cloudflare D1 ──────────────────────────────────────
      - name: Sync data to D1
        if: |
          github.event_name == 'workflow_dispatch' ||
          steps.fetch.outputs.CHANGED == 'true' ||
          steps.fetch_tips.outputs.CHANGED == 'true' ||
          steps.fetch_ratings.outputs.CHANGED == 'true'
        env:
          CF_D1_TOKEN:       ${{ secrets.CF_D1_TOKEN }}
          CF_ACCOUNT_ID:     ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
        run: |
          RATINGS_ARG=""
          if [ -f private-data/venueRatings.json ]; then RATINGS_ARG="--ratings private-data/venueRatings.json"; fi
          LISTS_ARG=""
          if [ -f private-data/lists.json ]; then LISTS_ARG="--lists private-data/lists.json"; fi
          if [ -z "$CF_D1_TOKEN" ]; then
            echo "⚠️  CF_D1_TOKEN not set — skipping D1 sync."
          else
            python scripts/sync_to_d1.py \
              --csv             private-data/checkins.csv \
              --tips            private-data/tips.json \
              --trips           trips_meta.json \
              --tips-changed    ${{ steps.fetch_tips.outputs.CHANGED    || 'false' }} \
              --ratings-changed ${{ steps.fetch_ratings.outputs.CHANGED || 'false' }} \
              --lists-changed   ${{ steps.fetch.outputs.CHANGED         || 'false' }} \
              --trips-changed   ${{ steps.fetch.outputs.CHANGED         || 'false' }} \
              $RATINGS_ARG $LISTS_ARG
          fi

      # ── 8. Commit HTML files to public repo → Cloudflare Pages auto-deploys ──
      - name: Commit updated HTML files
        if: |
          github.event_name == 'workflow_dispatch' ||
          steps.fetch.outputs.CHANGED == 'true' ||
          steps.fetch_tips.outputs.CHANGED == 'true' ||
          steps.fetch_photos.outputs.CHANGED == 'true' ||
          steps.fetch_ratings.outputs.CHANGED == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add index.html trips.html feed.html companions.html world_cities.html venues.html tips.html photos.html stats.html search.html trips_meta.json feed_meta.json
          # Only update ratings.html if ratings data was available during the build
          [ -f private-data/venueRatings.json ] && git add ratings.html || true
          # Only update lists.html if lists data was available during the build
          [ -f private-data/lists.json ] && git add lists.html || true

          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: auto-update dashboard [${TIMESTAMP}]"
            git push
          fi

  # ── Monthly job: deploy to Netlify on the last day of each month ────────────
  netlify-monthly:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs: update

    steps:
      - name: Check if today is last day of month
        id: lastday
        run: |
          TODAY=$(date -u +%d)
          LAST=$(date -u -d "$(date -u +%Y-%m-01) +1 month -1 day" +%d)
          if [ "$TODAY" = "$LAST" ]; then
            echo "is_last_day=true"  >> "$GITHUB_OUTPUT"
          else
            echo "is_last_day=false" >> "$GITHUB_OUTPUT"
            echo "Not the last day of month ($TODAY/$LAST) — skipping Netlify deploy."
          fi

      - uses: actions/checkout@v4
        if: steps.lastday.outputs.is_last_day == 'true'

      - name: Deploy to Netlify
        if: steps.lastday.outputs.is_last_day == 'true'
        env:
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          npm install -g netlify-cli
          netlify deploy \
            --site  "$NETLIFY_SITE_ID" \
            --auth  "$NETLIFY_AUTH_TOKEN" \
            --dir   "." \
            --prod \
            --message "Monthly deploy $(date -u +%Y-%m-%d)"
          echo "Netlify deploy complete."